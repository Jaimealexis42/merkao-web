name: Merkao Facebook + Instagram daily (post + reel)

# 1) Postea 1 variante por día a la Page de Merkao (FB) y a @merkao_marketplace
#    (IG) — texto + imagen producto.
# 2) Genera y publica 1 Reel diario (15s, 1080x1920) en IG + FB con un producto
#    random + Ken Burns + texto animado.
# Cron en UTC: 13:00 UTC == 08:00 America/Lima (Perú no tiene DST).
#
# Estructura esperada en el repo:
#   meta-api/post-facebook.mjs   ← lee variants.json y postea texto+foto en FB+IG
#   meta-api/create-reel.mjs     ← genera reel con ffmpeg y publica en FB+IG
#   meta-api/assets/logo.png     ← logo overlay para el reel (opcional)
#   meta-api/assets/bgm.mp3      ← audio de fondo (opcional; sino silencio)
#   posts/variants.json          ← 7 variantes generadas
#   meta-api/state.json          ← state del post (gitignored local; gestionado por CI)
#   meta-api/reel-state.json     ← state del reel (idem)
#
# Secrets requeridos en Settings → Secrets and variables → Actions:
#   META_PAGE_ID                    (FB Page ID de Merkao)
#   META_PAGE_ACCESS_TOKEN          (long-lived Page Access Token de FB)
#   META_IG_USER_ID                 (opcional — IG Business user id, p.ej. 27211757875141091)
#   META_IG_ACCESS_TOKEN            (opcional — long-lived IG token de graph.instagram.com,
#                                    flujo "Instagram API with Instagram Login". Dura 60d:
#                                    refrescar con GET /refresh_access_token antes de expirar)
#   SUPABASE_URL                    (opcional — usa productos reales en vez de Unsplash)
#   SUPABASE_ANON_KEY               (opcional — anon JWT del proyecto)
#   UNSPLASH_ACCESS_KEY             (opcional — fallback si Supabase no devuelve productos)
#   ANTHROPIC_API_KEY               (para futura regeneración de variantes)

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC todos los días = 08:00 Lima
  workflow_dispatch:        # botón manual desde la pestaña Actions
    inputs:
      force:
        description: 'Forzar post aunque ya se haya posteado hoy'
        required: false
        default: 'false'
      index:
        description: 'Forzar índice específico (0..6). Vacío = siguiente en rotación.'
        required: false
        default: ''
      skip_reel:
        description: 'Saltar generación de reel (solo postear texto+foto)'
        required: false
        default: 'false'
      skip_post:
        description: 'Saltar post texto+foto (solo reel)'
        required: false
        default: 'false'

permissions:
  contents: write   # necesario para commitear state.json de vuelta

concurrency:
  group: merkao-facebook-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # reel processing en IG puede tardar 2-5 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true   # mantiene el GITHUB_TOKEN para el push final

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar ffmpeg (pre-instalado en ubuntu-latest)
        run: ffmpeg -version | head -2

      - name: Mostrar contexto temporal
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Lima now: $(TZ=America/Lima date '+%Y-%m-%d %H:%M:%S')"

      - name: Postear texto+foto a Facebook + Instagram
        if: github.event.inputs.skip_post != 'true'
        working-directory: meta-api
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_IG_ACCESS_TOKEN: ${{ secrets.META_IG_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ github.event.inputs.index }}" ]; then ARGS="$ARGS --index=${{ github.event.inputs.index }}"; fi
          echo "Args: $ARGS"
          node post-facebook.mjs $ARGS

      - name: Generar y publicar Reel diario en IG + FB
        if: github.event.inputs.skip_reel != 'true'
        working-directory: meta-api
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_IG_ACCESS_TOKEN: ${{ secrets.META_IG_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          echo "Args: $ARGS"
          node create-reel.mjs $ARGS

      - name: Commitear states si cambiaron
        # state.json + reel-state.json están en .gitignore (porque local también
        # escribe). En CI usamos `git add -f` para forzarlos al repo y persistir
        # rotación + idempotencia diaria.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f meta-api/state.json meta-api/reel-state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "states sin cambios — nada que commitear (ya posteó hoy?)"
            exit 0
          fi
          git commit -m "chore(meta-api): update post+reel state [skip ci]"
          git push

      - name: Subir logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posting-logs-${{ github.run_id }}
          path: |
            meta-api/fb-posts.log
            meta-api/reel-posts.log
          retention-days: 30
          if-no-files-found: ignore
